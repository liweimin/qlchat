name: Release Windows EXE

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: python -m playwright install chromium

      - name: Build exe
        shell: pwsh
        run: .\scripts\build-windows.ps1

      - name: Smoke test
        shell: pwsh
        run: |
          $p = Start-Process -FilePath ".\qlchat-downloader.exe" -ArgumentList "--smoke-test" -PassThru -WindowStyle Hidden
          $ok = $p.WaitForExit(180000)
          if (-not $ok) {
            $p.Kill()
            throw "smoke test timed out"
          }
          if ($p.ExitCode -ne 0) {
            throw "smoke test failed with exit code $($p.ExitCode)"
          }

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: qlchat-downloader.exe
          generate_release_notes: true
